<!DOCTYPE html>
<html>
<head>
    <title>Ordenes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Ordenes</h2>

    <a href="{% url 'order_create' %}" class="btn btn-primary mb-3">Nueva Orden</a>

    <table class="table table-bordered">
        <tr>
            <th>Cliente</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>

        {% for o in orders %}
        <tr>
            <td>{{ o.customer.first_name }} {{ o.customer.last_name }}</td>
            <td>{{ o.product }}</td>
            <td>{{ o.quantity }}</td>
            <td>{{ o.date }}</td>
            <td>
                <a href="{% url 'order_update' o.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'order_delete' o.id %}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
