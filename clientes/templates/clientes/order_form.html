{% extends 'base.html' %}

{% block content %}

<h2>{% if form.instance.pk %}Editar Orden{% else %}Crear Orden{% endif %}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success">Guardar</button>
    <a href="{% url 'order_list' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
